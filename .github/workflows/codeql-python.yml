name: CodeQL Python Analysis

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/main.py'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/main.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    name: CodeQL Analyze (Python)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    outputs:
      count: ${{ steps.sarifcount.outputs.count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.WRITE_TOKEN }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          output: codeql-results

      - name: Upload SARIF results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif
          path: codeql-results/*.sarif

      - name: Count CodeQL results
        id: sarifcount
        run: |
          total=0
          for f in codeql-results/*.sarif; do
            [ -f "$f" ] || continue
            c=$(jq '[.runs[].results] | flatten | length' "$f")
            total=$(( total + c ))
          done
          echo "count=$total" >> "$GITHUB_OUTPUT"
      
      - name: Insecure -> Create pipeline.json and run SeCode Pipeline
        if: steps.sarifcount.outputs.count != '0'
        run: |
          echo "❌ Found ${{ steps.sarifcount.outputs.count }} issues."
          echo '{"tries": 0, "patched": false}' > pipeline.json

      - name: Upload pipeline.json
        uses: actions/upload-artifact@v4
        if: steps.sarifcount.outputs.count != '0'
        with:
          name: pipeline-json
          path: pipeline.json

      - name: Commit SARIF and pipeline files
        if: steps.sarifcount.outputs.count != '0'
        run: |
          ls -l codeql-results
          mkdir -p .cache
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"

          cp codeql-results/python.sarif .cache/
          cp pipeline.json .cache/

          git add .cache
          git diff --cached --quiet || git commit -m "CodeQL Results"
          git push
        env:
          WRITE_TOKEN: ${{ secrets.WRITE_TOKEN }}

      - name: Secure -> Exit
        if: steps.sarifcount.outputs.count == '0'
        run: echo "No CodeQL alerts. ✅ Secure."

  run-secode-pipeline:
    needs: analyze
    if: fromJson(needs.analyze.outputs.count) > 0
    uses: ./.github/workflows/secode-pipeline.yml
    with:
      language: "python"
    secrets: inherit